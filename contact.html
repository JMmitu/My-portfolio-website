<!-- CONTACT SECTION -->

<section
class="min-h-screen px-6 pt-40 pb-20"
>

<div class="text-center mb-16">

<p
class="uppercase tracking-[8px] text-purple-300 mb-4"
>
Contact Me
</p>

<h1
class="text-5xl md:text-7xl font-extrabold"
>
Get In Touch
</h1>

</div>



<div
class="max-w-7xl mx-auto grid md:grid-cols-2 gap-16 items-center"
>

<!-- LEFT CARD -->

<div
class="bg-white/10 backdrop-blur-xl border border-white/10 rounded-[40px] p-10 shadow-2xl"
>

<div class="flex justify-center mb-8">

<img
src="Profile Photo.jpeg"
alt="Profile"
class="w-[220px] h-[220px] object-cover rounded-full border-4 border-purple-400"
/>

</div>



<h2
class="text-4xl font-extrabold text-center mb-3"
>
Jannatul Mauwa Mitu
</h2>

<p
class="text-center text-gray-300 mb-10"
>
Frontend Developer & UI Designer
</p>



<div class="space-y-6">

<div class="flex items-center gap-4">

<i
class="ri-mail-fill text-3xl text-purple-300"
></i>

<p>
jannatulmauwamitu420@gmail.com
</p>

</div>



<div class="flex items-center gap-4">

<i
class="ri-phone-fill text-3xl text-purple-300"
></i>

<p>
01880677473
</p>

</div>



<div class="flex items-center gap-4">

<i
class="ri-map-pin-fill text-3xl text-purple-300"
></i>

<p>
Bangladesh
</p>

</div>

</div>

</div>



<!-- RIGHT FORM -->

<div
class="bg-white/10 backdrop-blur-xl border border-white/10 rounded-[40px] p-10 shadow-2xl"
>

<form
action="https://formsubmit.co/jannatulmauwamitu420@gmail.com"
method="POST"
class="space-y-6"
>

<input
type="hidden"
name="_captcha"
value="false"
/>

<input
type="hidden"
name="_subject"
value="New Portfolio Message"
/>

<!-- NAME -->

<div
class="grid md:grid-cols-2 gap-5"
>

<input
type="text"
name="First Name"
placeholder="First Name"
required
class="w-full bg-transparent border border-white/20 rounded-2xl px-5 py-4 outline-none focus:border-purple-400"
/>

<input
type="text"
name="Last Name"
placeholder="Last Name"
required
class="w-full bg-transparent border border-white/20 rounded-2xl px-5 py-4 outline-none focus:border-purple-400"
/>

</div>



<!-- EMAIL -->

<input
type="email"
name="Email"
placeholder="Email Address"
required
class="w-full bg-transparent border border-white/20 rounded-2xl px-5 py-4 outline-none focus:border-purple-400"
/>



<!-- PHONE -->

<input
type="text"
name="Phone"
placeholder="Phone Number"
required
class="w-full bg-transparent border border-white/20 rounded-2xl px-5 py-4 outline-none focus:border-purple-400"
/>



<!-- MESSAGE -->

<textarea
rows="5"
name="Message"
placeholder="Write Your Message..."
required
class="w-full bg-transparent border border-white/20 rounded-2xl px-5 py-4 outline-none focus:border-purple-400"
></textarea>



<button
type="submit"
class="w-full bg-gradient-to-r from-purple-500 to-blue-500 py-4 rounded-2xl font-bold text-lg hover:scale-105 duration-300"
>
Send Message
</button>

</form>
